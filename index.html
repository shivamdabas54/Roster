<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ops Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050505;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --sub:#6b7280;
  --purple:#A855F7;
  --cyan:#22D3EE;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:radial-gradient(circle at top,#0a0a0a,#050505);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1.1fr 2fr 1fr;
  gap:20px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(18px);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
}

h2{
  font-size:14px;
  margin-bottom:10px;
  color:#9ca3af;
  text-transform:uppercase;
}

/* SHIFT FOLKS */
.folk{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.02);
  margin-bottom:8px;
}

.avatar{
  width:48px;
  height:48px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#fff;
}

.badge{
  margin-left:auto;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
  background:rgba(168,85,247,0.2);
  color:var(--purple);
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.02);
  min-height:70px;
  font-size:12px;
}

/* UPDATES */
.update{
  margin-bottom:10px;
}

.update strong{
  display:block;
  margin-bottom:4px;
}

/* TASKS */
.tasks{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.task-col{
  background:rgba(255,255,255,0.02);
  padding:10px;
  border-radius:10px;
}

.task{
  font-size:12px;
  margin-bottom:6px;
}

/* TABLE */
table{
  width:100%;
  font-size:12px;
}

td,th{
  padding:8px;
  border-bottom:1px solid var(--border);
}

/* UPCOMING */
.event{
  margin-bottom:10px;
  font-size:12px;
}

</style>
</head>

<body>

<!-- TOP ROW -->
<div class="grid">

  <!-- SHIFT FOLKS -->
  <div class="card">
    <h2>Shift Folks</h2>
    <div id="shift"></div>
  </div>

  <!-- CALENDAR -->
  <div class="card">
    <h2>Calendar</h2>
    <div class="calendar" id="calendar"></div>
  </div>

  <!-- UPDATES -->
  <div class="card">
    <h2>Updates</h2>
    <div id="updates"></div>
  </div>

</div>

<!-- SECOND ROW -->
<div class="grid">

  <!-- TASKS -->
  <div class="card">
    <h2>Tasks</h2>
    <div class="tasks" id="tasks"></div>
  </div>

  <!-- ROSTER -->
  <div class="card">
    <h2>Full Roster</h2>
    <table>
      <tbody id="roster"></tbody>
    </table>
  </div>

  <!-- UPCOMING -->
  <div class="card">
    <h2>Upcoming</h2>
    <div id="events"></div>
  </div>

</div>

<script>
const data = [
  {name:"Shivam",shift:"Morning",color:"#A855F7"},
  {name:"Vijaya",shift:"Night",color:"#22D3EE"},
  {name:"Harsh",shift:"Afternoon",color:"#34d399"}
];

/* SHIFT */
const shiftDiv = document.getElementById('shift');
data.forEach(d=>{
  shiftDiv.innerHTML += `
    <div class="folk">
      <div class="avatar" style="background:${d.color}">${d.name[0]}</div>
      <div>${d.name}</div>
      <div class="badge">${d.shift}</div>
    </div>
  `;
});

/* CALENDAR */
const cal = document.getElementById('calendar');
for(let i=1;i<=30;i++){
  cal.innerHTML += `<div class="day">${i}</div>`;
}

/* UPDATES */
document.getElementById('updates').innerHTML = `
  <div class="update"><strong>Server Upgrade</strong>Tonight 11PM</div>
  <div class="update"><strong>Client Call</strong>Tomorrow 2PM</div>
`;

/* TASKS */
document.getElementById('tasks').innerHTML = `
  <div class="task-col">Todo<div class="task">Fix bug</div></div>
  <div class="task-col">Progress<div class="task">Deploy app</div></div>
  <div class="task-col">Done<div class="task">Report</div></div>
`;

/* ROSTER */
document.getElementById('roster').innerHTML = data.map(d=>`
<tr>
<td>${d.name}</td>
<td>${d.shift}</td>
</tr>
`).join('');

/* EVENTS */
document.getElementById('events').innerHTML = `
<div class="event">30 Apr - Deadline</div>
<div class="event">2 May - Meeting</div>
`;
</script>

</body>
</html>
