<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Roster Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="container">

    <header>
      <h1>Team Roster Dashboard</h1>
      <p id="date"></p>
    </header>

    <section class="shift">
      <h2>On Shift</h2>
      <div id="shiftContainer" class="shift-container"></div>
    </section>

    <section class="main-grid">
      
      <div class="card">
        <h2>Calendar</h2>
        <div id="calendar"></div>
      </div>

      <div class="card">
        <h2>Updates</h2>
        <ul id="updates"></ul>
      </div>

      <div class="card">
        <h2>Tasks</h2>
        <ul id="tasks"></ul>
      </div>

    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
