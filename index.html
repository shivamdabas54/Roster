<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0a0a0a, #050505);
  color: white;
  font-family: 'Inter', sans-serif;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
}

/* GLOW */
.glow:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 35px rgba(168,85,247,0.25);
}

/* STATUS */
.online { color:#22c55e; }
.busy { color:#eab308; }
.offline { color:#6b7280; }

/* CALENDAR GRID */
.calendar-day {
  height: 80px;
  border-radius: 12px;
  padding: 6px;
  background: rgba(255,255,255,0.02);
}
</style>
</head>

<body class="flex h-screen">

<!-- SIDEBAR -->
<div class="w-56 p-4 flex flex-col gap-4 glass m-4">
  <h1 class="text-xl text-purple-400 font-bold">TEAM OS</h1>

  <button class="p-2 rounded bg-purple-600">Dashboard</button>
  <button class="p-2 rounded">Roster</button>
  <button class="p-2 rounded">Calendar</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-6 overflow-y-auto">

<!-- TOP STATS -->
<div class="grid grid-cols-4 gap-4 mb-6">
  <div class="glass p-4 glow">Online <div id="online" class="text-cyan-400 text-xl"></div></div>
  <div class="glass p-4 glow">Total <div id="total" class="text-purple-400 text-xl"></div></div>
  <div class="glass p-4 glow">Night <div id="night" class="text-pink-400 text-xl"></div></div>
  <div class="glass p-4 glow">Tasks <div id="tasks" class="text-green-400 text-xl"></div></div>
</div>

<!-- MAIN GRID -->
<div class="grid grid-cols-3 gap-6">

<!-- BIG CALENDAR -->
<div class="col-span-2 glass p-4">

  <div class="flex justify-between mb-4">
    <h2 class="text-lg">April 2026</h2>
  </div>

  <div class="grid grid-cols-7 gap-2 text-xs text-gray-400 mb-2">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div id="calendar" class="grid grid-cols-7 gap-2"></div>

</div>

<!-- TEAM PANEL -->
<div class="glass p-4">
  <h2 class="mb-3 text-gray-400">Team</h2>
  <div id="team"></div>
</div>

</div>

</div>

<script>
let data = [];

/* LOAD DATA */
async function loadData(){
  const res = await fetch('data.json');
  data = await res.json();
  render();
}

/* RENDER STATS */
function renderStats(){
  document.getElementById('online').innerText = data.filter(x=>x.status==="Online").length;
  document.getElementById('total').innerText = data.length;
  document.getElementById('night').innerText = data.filter(x=>x.shift==="Night").length;
  document.getElementById('tasks').innerText = data.reduce((a,b)=>a+b.tasks,0);
}

/* TEAM */
function renderTeam(){
  let container = document.getElementById('team');
  container.innerHTML = '';

  data.forEach(m=>{
    container.innerHTML += `
    <div class="glass p-3 mb-2 glow flex justify-between">
      <div>
        <div>${m.name}</div>
        <div class="text-xs text-gray-400">${m.shift}</div>
      </div>
      <div class="${m.status.toLowerCase()} text-xs">${m.status}</div>
    </div>`;
  });
}

/* CALENDAR */
function renderCalendar(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  for(let i=1;i<=30;i++){
    cal.innerHTML += `
      <div class="calendar-day glass glow">
        <div class="text-xs">${i}</div>
      </div>
    `;
  }
}

/* INIT */
function render(){
  renderStats();
  renderTeam();
  renderCalendar();
}

loadData();
</script>

</body>
</html>
